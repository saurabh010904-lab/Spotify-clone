<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotify Login</title>
  <link rel="icon" href="logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
   
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(-45deg, #1DB954, #121212, #1DB954, #000000);
      background-size: 400% 400%;
      animation: gradientMove 10s ease infinite;
      overflow: hidden;
      color: white;
      position: relative;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

 
    .login-box {
      background: rgba(24, 24, 24, 0.8);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 20px;
      width: 340px;
      text-align: center;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.6);
      animation: fadeIn 1.5s ease;
      border: 1px solid rgba(255, 255, 255, 0.05);
      z-index: 2;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }


    .login-box img {
      width: 70px;
      height: 70px;
      margin-bottom: 15px;
      filter: drop-shadow(0 0 8px #1DB954);
    }

    .login-box h2 {
      color: #1DB954;
      margin-bottom: 25px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    
    .login-box input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 25px;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      outline: none;
      font-size: 14px;
      transition: 0.3s;
      text-align: center;
    }

    .login-box input:focus {
      background: rgba(255, 255, 255, 0.2);
      box-shadow: 0 0 8px #1DB954;
    }

    
    .login-box button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 25px;
      background: linear-gradient(90deg, #1DB954, #1ed760);
      color: white;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 15px;
      transition: 0.4s;
      box-shadow: 0 0 10px rgba(29, 185, 84, 0.4);
    }

    .login-box button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(29, 185, 84, 0.8);
    }

    
    .glow {
      position: absolute;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(29,185,84,0.5) 0%, transparent 70%);
      border-radius: 50%;
      animation: float 6s ease-in-out infinite alternate;
      filter: blur(30px);
      z-index: 0;
    }

    .glow:nth-child(1) { top: 10%; left: 20%; animation-delay: 0s; }
    .glow:nth-child(2) { bottom: 15%; right: 25%; animation-delay: 3s; }

    @keyframes float {
      from { transform: translateY(0px); }
      to { transform: translateY(30px); }
    }

   
    .signature {
      position: absolute;
      bottom: 15px;
      right: 20px;
      font-size: 14px;
      color: #1DB954;
      text-shadow: 0 0 10px #1DB954, 0 0 20px #1ed760;
      animation: glowPulse 2s infinite alternate;
      font-weight: 500;
      letter-spacing: 1px;
      z-index: 3;
    }

    @keyframes glowPulse {
      0% { opacity: 0.7; text-shadow: 0 0 5px #1DB954, 0 0 10px #1ed760; }
      100% { opacity: 1; text-shadow: 0 0 15px #1DB954, 0 0 25px #1ed760; }
    }
  </style>
</head>
<body>
 
  <div class="glow"></div>
  <div class="glow"></div>

  
  <div class="login-box">
    <img src="logo.png" alt="Spotify Logo">
    <h2>Login to Spotify</h2>

    <form action="index.html" method="get">
      <input type="text" placeholder="Username" required>
      <input type="password" placeholder="Password" required>
      <button type="submit">Log In</button>
    </form>
  </div>

 
  <div class="signature">✨ Made by Saurabh Raj ✨</div>
</body>
</html>
